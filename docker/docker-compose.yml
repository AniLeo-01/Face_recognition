version: "3.9"

services:
  # ----- Face Recognition API (CPU) -----
  face-recognition-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: face-recognition-api
    ports:
      - "8000:8000"
    volumes:
      - face_data:/app/data
      - face_logs:/app/logs
      - face_models:/app/models
    environment:
      - USE_GPU=false
      - DATABASE_URL=sqlite+aiosqlite:///./data/face_recognition.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ----- Face Recognition API (GPU) -----
  # Uncomment to use GPU-accelerated version
  # face-recognition-api-gpu:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.gpu
  #   container_name: face-recognition-api-gpu
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - face_data:/app/data
  #     - face_logs:/app/logs
  #     - face_models:/app/models
  #   environment:
  #     - USE_GPU=true
  #     - DATABASE_URL=sqlite+aiosqlite:///./data/face_recognition.db
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped

volumes:
  face_data:
  face_logs:
  face_models:
